receivers:
  otlp:
    protocols:
      grpc:
        endpoint: localhost:4317
      http:
        endpoint: localhost:4318

processors:
  batch:

extensions:
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/extension/azureauthextension#examples
  azureauth/monitor:
    scopes:
      - https://monitor.azure.com/.default
    service_principal:
      tenant_id: "${env:AZURE_TENANT_ID}"
      client_id: "${env:AZURE_CLIENT_ID}"
      client_secret: "${env:AZURE_CLIENT_SECRET}"
  healthcheckv2:
    use_v2: true
    component_health:
      include_permanent_errors: true
      include_recoverable_errors: true
      recovery_duration: 5m
    http:
      endpoint: "localhost:13133"
      status:
        enabled: true
        path: "/health/status"
        include_attributes: true
      config:
        enabled: false

exporters:
  otlphttp/azuremonitor:
    # https://learn.microsoft.com/en-us/azure/azure-monitor/containers/opentelemetry-protocol-ingestion#option-1-create-an-application-insights-resource-with-otlp-support-recommended
    traces_endpoint: "https://managed-appi-bank-api-001-dce-1mff.germanywestcentral-1.ingest.monitor.azure.com/dataCollectionRules/dcr-7e52f39700ef461cb0ba044c7b053b0b/streams/Microsoft-OTLP-Traces/otlp/v1/traces"
    logs_endpoint: "https://managed-appi-bank-api-001-dce-1mff.germanywestcentral-1.ingest.monitor.azure.com/dataCollectionRules/dcr-7e52f39700ef461cb0ba044c7b053b0b/streams/Microsoft-OTLP-Logs/otlp/v1/logs"
    metrics_endpoint: "https://managed-appi-bank-api-001-dce-1mff.germanywestcentral-1.metrics.ingest.monitor.azure.com/dataCollectionRules/dcr-7e52f39700ef461cb0ba044c7b053b0b/streams/Microsoft-OtelMetrics/otlp/v1/metrics"
    auth:
      authenticator: azureauth/monitor

service:
  extensions:
    - azureauth/monitor
    - healthcheckv2
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/azuremonitor]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/azuremonitor]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/azuremonitor]