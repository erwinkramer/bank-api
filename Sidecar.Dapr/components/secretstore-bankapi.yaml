apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore-bankapi
spec:
  type: secretstores.azure.keyvault
  version: v1
  metadata:
    - name: vaultName
      value: kv-certificates-01123
    # Following enable local/non-MI environments to authenticate with client credentials.
    # When they are absent or incomplete, Dapr can fall through to managed identity.    
    - name: azureTenantId
      secretKeyRef:
        name: AZURE_TENANT_ID
        key: AZURE_TENANT_ID
    - name: azureClientId
      secretKeyRef:
        name: AZURE_CLIENT_ID
        key: AZURE_CLIENT_ID
    - name: azureClientSecret
      secretKeyRef:
        name: AZURE_CLIENT_SECRET
        key: AZURE_CLIENT_SECRET
auth:
  secretStore: secretstore-envvars
