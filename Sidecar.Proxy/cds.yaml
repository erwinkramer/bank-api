resources:
  - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
    name: api_stable
    type: STATIC
    load_assignment:
      cluster_name: api_stable
      endpoints:
        - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8080
  - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
    name: api_beta
    type: STATIC
    load_assignment:
      cluster_name: api_beta
      endpoints:
        - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8081
  - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
    name: api_mcp
    type: STATIC
    load_assignment:
      cluster_name: api_mcp
      endpoints:
        - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8082