parameters:
  bank_api_s3proxy:
    bank_api_s3proxy_image: "bank-api-s3proxy:latest"
  bank_api_dapr:
    bank_api_dapr_image: "bank-api-dapr:latest"
  bank_api:
    port_http: 8080
    bank_api_image: "bank-api:latest"
  bank_api_beta:
    port_http: 8080
    bank_api_beta_image: "bank-api-beta:latest"
  bank_api_mcp:
    port_http: 8080
    bank_api_mcp_image: "bank-api-mcp:latest"
secrets:
