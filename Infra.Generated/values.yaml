    ASPNETCORE_ENVIRONMENT: ""
    AZURE_TENANT_ID: ""
    AZURE_CLIENT_ID: ""
    AZURE_CLIENT_SECRET: ""
  bank_api_dapr:
    ASPNETCORE_ENVIRONMENT: ""
    AZURE_TENANT_ID: ""
    AZURE_CLIENT_ID: ""
    AZURE_CLIENT_SECRET: ""
