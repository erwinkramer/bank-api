---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "bank-api-postgres-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "bank-api-postgres"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  POSTGRES_PASSWORD: "{{ .Values.secrets.bank_api_postgres.bank_api_postgres_password }}"
type: "Opaque"
