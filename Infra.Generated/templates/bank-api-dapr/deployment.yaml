---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "bank-api-dapr-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "bank-api-dapr"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "bank-api-dapr"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.bank_api_dapr.bank_api_dapr_image }}"
          name: "bank-api-dapr"
          envFrom:
            - secretRef:
                name: "bank-api-dapr-secrets"
          ports:
            - name: "dapr-http"
              protocol: "TCP"
              containerPort: 3500
            - name: "dapr-grpc"
              protocol: "TCP"
              containerPort: 50002
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "bank-api-dapr"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
