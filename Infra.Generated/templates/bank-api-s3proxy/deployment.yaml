---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "bank-api-s3proxy-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "bank-api-s3proxy"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "bank-api-s3proxy"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.bank_api_s3proxy.bank_api_s3proxy_image }}"
          name: "bank-api-s3proxy"
          envFrom:
            - secretRef:
                name: "bank-api-s3proxy-secrets"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 6070
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "bank-api-s3proxy"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
